<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="username-page" class="fade-in">
    <div class="username-page-container">
      <h1 class="title">Join Chat</h1>
      <form id="usernameForm">
        <div class="form-group">
          <input type="text" id="name" class="form-control" placeholder="Enter your name" required />
        </div>
        <div class="form-group">
          <button type="submit" class="primary">Join Chat</button>
        </div>
        <div class="form-group">
          <button type="button" id="themeToggle" class="secondary">🌞 Toggle Light/Dark</button>
        </div>
      </form>
    </div>
  </div>

  <div id="chat-page" class="hidden">
    <div class="chat-container">
      <div class="chat-header">
        <h2>Chat Room</h2>
      </div>
      <ul id="messageArea"></ul>
      <form id="messageForm">
        <div class="input-group">
          <input type="text" id="message" class="form-control" placeholder="Type a message..." required />
          <button type="submit" class="primary">Send</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
